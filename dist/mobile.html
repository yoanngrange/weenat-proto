<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Weenat — Mobile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111318;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      gap: 20px;
    }

    /* ── Context label ── */
    .context-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      color: rgba(255,255,255,.45);
      font-size: 13px;
      letter-spacing: .04em;
    }
    .context-bar a {
      color: rgba(255,255,255,.3);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color .15s;
    }
    .context-bar a:hover { color: rgba(255,255,255,.7); }
    .context-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #30d158;
      box-shadow: 0 0 6px #30d158;
    }

    /* ── Phone shell ── */
    .phone-shell {
      width: 390px;
      height: 844px;
      border-radius: 54px;
      background: #1c1c1e;
      box-shadow:
        0 0 0 1px #3a3a3c,
        0 0 0 3px #1c1c1e,
        0 0 0 4px #48484a,
        0 30px 80px rgba(0,0,0,.8);
      position: relative;
      flex-shrink: 0;
    }

    /* Side buttons */
    .phone-shell::before {
      content: '';
      position: absolute;
      left: -3px; top: 140px;
      width: 3px; height: 36px;
      background: #3a3a3c;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 52px 0 #3a3a3c, 0 104px 0 #3a3a3c;
    }
    .phone-shell::after {
      content: '';
      position: absolute;
      right: -3px; top: 200px;
      width: 3px; height: 70px;
      background: #3a3a3c;
      border-radius: 0 2px 2px 0;
    }

    /* ── Phone screen ── */
    .phone-screen {
      position: absolute;
      inset: 6px;
      border-radius: 48px;
      overflow: hidden;
      background: #f2f2f7;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ── Status bar ── */
    .status-bar {
      height: 50px;
      padding: 14px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .status-bar.light { color: #000; }
    .status-bar.dark  { color: #fff; }
    .status-time { font-size: 16px; font-weight: 600; letter-spacing: -.3px; }
    .status-icons { display: flex; align-items: center; gap: 6px; font-size: 14px; }

    /* Dynamic island */
    .dynamic-island {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 20;
    }

    /* ── Screens ── */
    .screen-stack {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .m-screen {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      display: none;
    }
    .m-screen.active { display: block; }

    /* Navbar sticks to top within scrolling screen */
    .m-screen .m-navbar {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    /* Segment sticks just below the navbar */
    #screen-parametres .m-segment-wrap {
      position: sticky;
      top: 44px;
      z-index: 9;
    }

    /* Placeholder screen */
    .screen-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #8e8e93;
      min-height: 300px;
    }
    .screen-placeholder i { font-size: 42px; opacity: .35; }
    .screen-placeholder p { font-size: 15px; }

    /* ── Bottom nav ── */
    .bottom-nav {
      height: 90px;
      background: rgba(249,249,249,.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: .5px solid rgba(0,0,0,.12);
      display: flex;
      align-items: flex-start;
      padding-top: 8px;
      flex-shrink: 0;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border: none;
      background: none;
      color: #8e8e93;
      font-family: inherit;
      transition: color .1s;
    }
    .nav-item.active { color: #0172A4; }
    .nav-item i { font-size: 25px; line-height: 1; }
    .nav-item span { font-size: 11px; font-weight: 500; letter-spacing: -.1px; }

    /* ── Top nav bar ── */
    .m-navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 0 16px;
      background: rgba(249,249,249,.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: .5px solid rgba(0,0,0,.12);
      flex-shrink: 0;
    }

    .m-navbar-logo {
      display: flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
    }
    .m-navbar-logo-mark {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .m-navbar-favicon {
      width: 36px; height: 36px; border-radius: 9px;
      display: block; flex-shrink: 0;
    }

    .m-navbar-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: 600;
      color: #000;
      letter-spacing: -.3px;
      pointer-events: none;
    }

    .m-navbar-action {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #0172A4;
      border: none;
      color: #fff;
      font-size: 19px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    .m-navbar-action:active { opacity: .7; }

    /* ── Segmented control (Paramètres tabs) ── */
    .m-segment-wrap {
      padding: 10px 16px 8px;
      background: #f2f2f7;
      flex-shrink: 0;
    }
    .m-segment {
      display: flex;
      background: #e5e5ea;
      border-radius: 9px;
      padding: 2px;
      gap: 2px;
    }
    .m-segment-btn {
      flex: 1;
      border: none;
      background: none;
      border-radius: 7px;
      padding: 6px 4px;
      font-size: 13px;
      font-weight: 500;
      color: #3c3c43;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .m-segment-btn.active {
      background: #fff;
      color: #000;
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }

    .m-subscreen {
      display: none;
    }
    .m-subscreen.active { display: block; }

    /* ── Dashboard ── */
    .m-exploit-banner {
      display: flex; align-items: center; gap: 8px;
      margin: 12px 16px 8px;
      padding: 10px 14px;
      background: #fff;
      border-radius: 10px;
      font-size: 16px; font-weight: 600; color: #000;
      border: 1px solid rgba(0,0,0,.07);
    }
    .m-exploit-banner i { color: #0172A4; font-size: 17px; }

    .m-widget {
      margin: 0 16px 16px;
      background: #fff;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.07);
      overflow: hidden;
    }
    .m-widget:first-child {
      margin-top: 12px;
    }
    .m-widget-hd {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 14px 10px;
      border-bottom: .5px solid rgba(0,0,0,.08);
    }
    .m-widget-icon-wrap {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .m-widget-title { flex: 1; font-size: 16px; font-weight: 600; color: #000; }
    .m-widget-menu {
      width: 36px; height: 36px; border: none; background: none;
      font-size: 17px; color: #8e8e93; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; letter-spacing: 1px;
    }
    .m-widget-menu:active { background: #f2f2f7; }
    .m-widget-bd { padding: 12px 14px 14px; }
    .m-widget-empty { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px; color: #8e8e93; font-size: 15px; }
    .m-widget-more { text-align: center; font-size: 14px; color: #0172A4; padding-top: 8px; }

    /* Bilan hydrique */
    .m-bh-table {
      display: grid;
      grid-template-columns: 1fr 38px 38px 46px 46px;
      gap: 0 4px;
    }
    .m-bh-gh {
      font-size: 10px; font-weight: 700; color: #0172A4;
      text-align: center; padding-bottom: 3px; text-transform: uppercase; letter-spacing: .04em;
      border-bottom: 1.5px solid currentColor; margin-bottom: 2px;
    }
    .m-bh-th {
      font-size: 11px; font-weight: 700; color: #8e8e93;
      text-align: right; padding-bottom: 6px; text-transform: uppercase; letter-spacing: .03em;
    }
    .m-bh-unit-lbl {
      text-align: left !important; font-size: 10px; font-weight: 400;
      color: #b0aead; text-transform: none; letter-spacing: 0;
    }
    .m-bh-th-n {
      font-size: 14px; color: #000; padding: 8px 0;
      border-top: .5px solid rgba(0,0,0,.07);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-bh-td {
      font-size: 13px; color: #636366; text-align: right;
      padding: 8px 0; border-top: .5px solid rgba(0,0,0,.07);
      white-space: nowrap;
    }
    .m-bh-td--reco { color: #C05000; font-weight: 600; }
    .m-bh-td--planif { color: #185FA5; font-weight: 600; }
    .m-bh-group-row {
      grid-column: 1 / -1;
      font-size: 11px; font-weight: 700; color: #0172A4;
      padding: 10px 0 3px; margin-top: 2px;
      border-top: .5px solid rgba(0,0,0,.07);
      letter-spacing: .02em;
    }
    .m-bh-group-row:first-of-type { border-top: none; padding-top: 4px; }
    .m-bh-expand {
      width: 100%; padding: 12px; margin-top: 8px;
      border: 1px dashed rgba(0,0,0,.15); border-radius: 10px;
      background: none; font-size: 15px; color: #0172A4;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .m-bh-actions {
      display: flex; flex-direction: column; gap: 8px;
      margin-top: 14px; padding-top: 14px;
      border-top: .5px solid rgba(0,0,0,.08);
    }
    .m-bh-action {
      width: 100%; padding: 13px; border-radius: 12px;
      font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
      border: none; display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #185FA5; color: #fff; transition: opacity .12s;
    }
    .m-bh-action:active { opacity: .85; }
    .m-bh-action--sec { background: #E6F1FB; color: #185FA5; }
    .m-bh-action--cal { background: transparent; color: #185FA5; border: 1px solid #185FA5; }

    /* ── Irrigation screens ───────────────────────────────────────────────── */
    .irr-detail-header {
      background: #fff; border-bottom: .5px solid rgba(0,0,0,.1); flex-shrink: 0;
    }
    .irr-header-row {
      height: 52px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 10px;
    }
    .irr-header-title {
      font-size: 16px; font-weight: 600; color: #1A1A18;
      position: absolute; left: 50%; transform: translateX(-50%);
      white-space: nowrap;
    }
    .irr-back {
      font-size: 14px; color: #185FA5; background: none; border: none;
      cursor: pointer; font-family: inherit; padding: 8px; display: flex;
      align-items: center; gap: 2px; flex-shrink: 0; z-index: 1;
    }
    .irr-scroll-body {
      flex: 1; overflow-y: auto; padding: 12px 14px;
      background: #F5F4F0; -webkit-overflow-scrolling: touch;
    }
    .irr-scroll-body::-webkit-scrollbar { display: none; }
    .irr-section-lbl {
      font-size: 11px; font-weight: 700; color: #6B6A65;
      text-transform: uppercase; letter-spacing: .06em;
      margin: 12px 0 6px;
    }
    .irr-group-hint {
      font-size: 12px; color: #6B6A65; margin-bottom: 6px; display: flex;
      align-items: center; gap: 5px;
    }
    .irr-group-card {
      background: #fff; border: 1px solid #E0DED8; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 6px; display: flex;
      align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .irr-group-card--sel { border-color: #185FA5; background: #F0F6FD; }
    .irr-group-name {
      font-size: 14px; font-weight: 500; color: #1A1A18;
    }
    .irr-group-card--sel .irr-group-name { color: #0C447C; }
    .irr-group-meta { font-size: 12px; color: #6B6A65; margin-top: 2px; }
    .irr-plot-row {
      background: #fff; border: 1px solid #E0DED8; border-radius: 10px;
      padding: 11px 13px; margin-bottom: 5px; display: flex;
      align-items: flex-start; justify-content: space-between;
      cursor: pointer; gap: 8px; user-select: none;
    }
    .irr-plot-row--sel { border-color: #185FA5; }
    .irr-plot-name { font-size: 14px; font-weight: 500; color: #1A1A18; }
    .irr-plot-info {
      font-size: 11px; color: #6B6A65; margin-top: 2px; display: block;
    }
    .irr-plot-info--miss { color: #C05000; }
    .irr-divider { height: 1px; background: #E0DED8; margin: 10px 0; }
    .irr-chk {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid #E0DED8; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px; transition: all .12s;
    }
    .irr-chk--on {
      background: #185FA5; border-color: #185FA5;
      position: relative;
    }
    .irr-chk--on::after {
      content: ''; width: 8px; height: 5px;
      border-left: 2px solid #fff; border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translateY(-1px); display: block;
    }
    .irr-chk--partial {
      border-color: #185FA5; color: #185FA5;
      font-size: 13px; font-weight: 700;
    }
    .irr-fields-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .irr-field-card {
      flex: 1; background: #fff; border: 1px solid #E0DED8;
      border-radius: 12px; padding: 10px 12px;
    }
    .irr-field-lbl {
      font-size: 11px; color: #6B6A65; margin-bottom: 4px;
    }
    .irr-unit { color: #9E9D98; }
    .irr-date-input {
      width: 100%; border: none; border-bottom: 1.5px solid #C8C6C0;
      background: transparent; padding-bottom: 3px;
      font-size: 15px; font-weight: 600; color: #1A1A18;
      font-family: inherit; outline: none;
    }
    .irr-date-input:focus { border-bottom-color: #185FA5; }
    .irr-date-input::-webkit-calendar-picker-indicator { opacity: .4; cursor: pointer; width: 14px; }
    .irr-qty-input {
      width: 100%; border: none; border-bottom: 1.5px solid #C8C6C0;
      background: transparent; padding-bottom: 3px;
      font-size: 19px; font-weight: 600; color: #1A1A18;
      font-family: inherit; outline: none;
    }
    .irr-qty-input:focus { border-bottom-color: #185FA5; }
    .irr-field-hint { font-size: 11px; color: #9E9D98; margin-top: 3px; }
    .irr-pill--past   { font-size: 11px; background: #EAF3DE; color: #3B6D11; padding: 1px 6px; border-radius: 8px; }
    .irr-pill--future { font-size: 11px; background: #E6F1FB; color: #0C447C; padding: 1px 6px; border-radius: 8px; }
    .irr-preview-box {
      background: #E6F1FB; border-radius: 10px; padding: 9px 12px;
      font-size: 13px; margin-bottom: 8px; min-height: 36px;
      display: flex; align-items: center; justify-content: center; text-align: center;
    }
    .irr-preview-ok { color: #185FA5; font-weight: 500; }
    .irr-bottom-spacer { height: 16px; }
    .irr-bottom-bar {
      background: #fff; border-top: .5px solid rgba(0,0,0,.1);
      padding: 10px 14px 24px; flex-shrink: 0;
      box-shadow: 0 -8px 20px rgba(0,0,0,.07);
    }
    .irr-summary {
      font-size: 12px; color: #6B6A65; text-align: center;
      margin-bottom: 6px; min-height: 14px;
    }
    .irr-save-btn {
      width: 100%; background: #185FA5; color: #fff;
      border-radius: 12px; padding: 15px; font-size: 15px; font-weight: 600;
      font-family: inherit; border: none; cursor: pointer; transition: opacity .12s;
    }
    .irr-save-btn:disabled { opacity: .35; cursor: default; }
    .irr-apercu-summary {
      background: #fff; border: 1px solid #E0DED8; border-radius: 12px;
      padding: 14px 16px; display: flex; justify-content: space-between;
      align-items: flex-start; gap: 12px; margin-bottom: 10px;
    }
    .irr-apercu-list {
      background: #fff; border: 1px solid #E0DED8; border-radius: 12px;
      padding: 10px 14px; margin-bottom: 10px;
    }
    .irr-apercu-big { font-size: 19px; font-weight: 700; color: #1A1A18; }
    .irr-apercu-sub { font-size: 12px; color: #6B6A65; margin-top: 2px; }
    .irr-occ-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; border-bottom: .5px solid #E0DED8;
    }
    /* ── Two-zone scrollable layout ── */
    .irr-two-zones {
      display: flex; flex-direction: column; gap: 8px; overflow-y: hidden !important;
    }
    .irr-zone {
      flex: 1; min-height: 0; display: flex; flex-direction: column;
      background: #fff; border-radius: 12px; border: 1px solid #E0DED8; overflow: hidden;
    }
    .irr-zone-hd {
      padding: 8px 12px; font-size: 11px; font-weight: 700; color: #6B6A65;
      text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0;
      border-bottom: .5px solid #E0DED8;
    }
    .irr-zone-inner {
      flex: 1; min-height: 0; overflow-y: auto; padding: 4px 0;
      scrollbar-width: none;
    }
    .irr-zone-inner::-webkit-scrollbar { display: none; }
    .irr-zone { position: relative; }
    .irr-fake-track {
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 3px; background: #D8D6D2; border-radius: 3px;
      pointer-events: none;
    }
    .irr-fake-thumb {
      position: absolute; right: 0; width: 3px;
      background: rgba(0,0,0,.32); border-radius: 3px;
      pointer-events: none; transition: opacity .15s; opacity: 0;
    }
    .irr-plot-row--child {
      margin-left: 14px;
      border-left: 2px solid #E0DED8;
      border-radius: 0 10px 10px 0 !important;
      padding: 8px 13px 8px 10px;
      align-items: center;
    }
    .irr-plot-row--child.irr-plot-row--sel { border-left-color: #185FA5; }
    .irr-zone .irr-group-card { border-radius: 0; border: none; border-bottom: .5px solid #F5F4F0; }
    .irr-zone .irr-group-card:last-child { border-bottom: none; }
    .irr-zone .irr-plot-row { border-radius: 0; border: none; border-bottom: .5px solid #F5F4F0; }
    .irr-zone .irr-plot-row:last-child { border-bottom: none; }

    /* ── Delete button in day detail ── */
    .irr-del-btn {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: #FDECEC; color: #8B1A1A; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .irr-del-btn:active { opacity: .7; }

    /* ── Tour d'eau Enrouleur ── */
    .irr-enr-body { padding: 12px 14px !important; }
    .irr-enr-hint { font-size: 13px; color: #6B6A65; line-height: 1.5; margin-bottom: 12px; }
    .irr-enr-row {
      display: flex; align-items: center; gap: 10px;
      background: #fff; border: 1px solid #E0DED8; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 6px;
    }
    .irr-enr-order {
      width: 26px; height: 26px; border-radius: 13px; background: #185FA5;
      color: #fff; font-size: 14px; font-weight: 700; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .irr-enr-name { flex: 1; font-size: 14px; font-weight: 500; color: #1A1A18; }
    .irr-enr-arrows { display: flex; gap: 4px; flex-shrink: 0; }
    .irr-enr-arrows button {
      width: 26px; height: 26px; border-radius: 6px; border: 1px solid #E0DED8;
      background: #F5F4F0; font-size: 14px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .irr-enr-arrows button:disabled { opacity: .3; cursor: default; }
    .irr-enr-hrs { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .irr-enr-input {
      width: 44px; border: 1px solid #E0DED8; border-radius: 8px;
      padding: 5px 6px; font-size: 15px; font-weight: 600; font-family: inherit;
      text-align: center; outline: none; background: #F5F4F0;
    }
    .irr-enr-unit { font-size: 12px; color: #6B6A65; }
    .irr-enr-total {
      background: #F5F4F0; border-radius: 10px; padding: 10px 14px;
      font-size: 13px; color: #1A1A18; margin-top: 8px;
    }
    .irr-enr-total--over { background: #FEF0E6; color: #C05000; }

    /* ── Fixed inputs section ── */
    .irr-fixed-inputs {
      background: #F5F4F0; border-bottom: .5px solid rgba(0,0,0,.1);
      padding: 10px 14px 12px;
    }
    .irr-list-section-lbl {
      font-size: 11px; font-weight: 700; color: #6B6A65;
      text-transform: uppercase; letter-spacing: .06em;
      margin: 8px 0 6px;
    }

    /* ── Edit button in list ── */
    .irr-edit-btn {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: #F5F4F0; color: #6B6A65; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .irr-edit-btn:active { background: #E0DED8; }
    .irr-cal-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 60px 24px; text-align: center;
      font-size: 14px; color: #9E9D98; line-height: 1.5;
    }
    .irr-cal-strat-btn {
      font-size: 13px; font-weight: 600; color: #185FA5;
      background: #E6F1FB; border: 1.5px solid #185FA5;
      border-radius: 8px; padding: 8px 14px; cursor: pointer; font-family: inherit;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .irr-cal-strat-btn:active { background: #CCE0F5; }
    .irr-presel-banner {
      display: flex; align-items: center; gap: 10px;
      background: #E6F1FB; border-radius: 12px; padding: 12px 14px;
      font-size: 14px; font-weight: 600; color: #0C447C; margin-bottom: 8px;
    }
    .irr-cal-add-bar {
      display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px;
    }
    .irr-cal-add-btn {
      width: 100%; padding: 13px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: #185FA5; color: #fff; transition: opacity .12s;
    }
    .irr-cal-add-btn:active { opacity: .85; }
    .irr-cal-add-btn--sec { background: #E6F1FB; color: #185FA5; }

    /* ── Bottom sheet ── */
    .irr-sheet-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,.4);
      display: flex; align-items: flex-end; opacity: 0; pointer-events: none;
      transition: opacity .2s; z-index: 2000;
    }
    .irr-sheet-overlay--open { opacity: 1; pointer-events: all; }
    .irr-sheet {
      background: #fff; border-radius: 20px 20px 0 0; padding: 12px 16px 32px;
      width: 100%; transform: translateY(100%);
      transition: transform .25s cubic-bezier(.32,.72,0,1);
    }
    .irr-sheet-overlay--open .irr-sheet { transform: translateY(0); }
    .irr-sheet-handle {
      width: 36px; height: 4px; background: #E0DED8; border-radius: 2px;
      margin: 0 auto 14px;
    }
    .irr-sheet-title {
      font-size: 14px; font-weight: 700; color: #6B6A65;
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px;
    }
    .irr-sheet-body { margin-bottom: 14px; }
    .irr-sheet-actions { display: flex; gap: 8px; }
    .irr-sheet-del {
      padding: 15px 16px; border-radius: 12px; border: 1px solid #FDECEC;
      background: #FDECEC; color: #8B1A1A; font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }
    .irr-sheet-save {
      flex: 1; padding: 15px; border-radius: 12px; border: none;
      background: #185FA5; color: #fff; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }

    /* ── Scope selector ── */
    .irr-scope-box {
      background: #E6F1FB; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
    }
    .irr-scope-lbl { font-size: 12px; font-weight: 600; color: #0C447C; margin-bottom: 8px; }
    .irr-scope-btns { display: flex; gap: 6px; }
    .irr-scope-btn {
      flex: 1; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 400;
      font-family: inherit; cursor: pointer; border: 1.5px solid #E0DED8;
      background: #F5F4F0; color: #1A1A18; transition: all .12s;
    }
    .irr-scope-btn--on { background: #185FA5; color: #fff; border-color: #185FA5; font-weight: 500; }
    .irr-scope-btn--danger { background: #8B1A1A; color: #fff; border-color: #8B1A1A; }

    /* ── Strategy edit options ── */
    .irr-strat-opt {
      display: flex; align-items: center; gap: 14px; padding: 16px 14px;
      border-radius: 12px; border: 1px solid #E0DED8; cursor: pointer;
      margin-bottom: 8px; transition: background .12s;
    }
    .irr-strat-opt:active { background: #F5F4F0; }
    .irr-strat-opt--danger { border-color: #FDECEC; }
    .irr-strat-opt--danger:active { background: #FDECEC; }
    .irr-strat-opt-icon {
      width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 17px;
    }
    .irr-strat-opt-title { font-size: 15px; font-weight: 500; color: #1A1A18; }
    .irr-strat-opt-sub { font-size: 12px; color: #6B6A65; margin-top: 2px; }
    .irr-stop-confirm {
      background: #FAEEDA; border-radius: 10px; padding: 12px; margin-top: 10px;
    }

    .irr-more-label {
      font-size: 13px; color: #0172A4; text-align: center; padding: 10px 0;
      background: none; border: none; font-family: inherit; cursor: pointer;
    }

    /* ── Confirmation ── */
    .irr-confirm-body {
      display: flex; flex-direction: column; align-items: center;
      padding-top: 32px; gap: 8px;
    }
    .irr-confirm-icon-wrap {
      width: 60px; height: 60px; border-radius: 50%;
      background: #EAF3DE; display: flex; align-items: center;
      justify-content: center; font-size: 30px; color: #3B6D11; margin-bottom: 4px;
    }
    .irr-confirm-title { font-size: 21px; font-weight: 700; color: #1A1A18; }
    .irr-confirm-sub   { font-size: 14px; color: #6B6A65; text-align: center; }
    .irr-confirm-parcels {
      width: 100%; max-width: 280px; margin: 0 auto 12px;
      background: #f9f9f9; border: 1px solid rgba(0,0,0,.07);
      border-radius: 12px; padding: 8px 14px; text-align: left;
    }
    .irr-confirm-parcel {
      font-size: 14px; color: #3a3a3c; padding: 3px 0;
      border-bottom: .5px solid rgba(0,0,0,.06);
    }
    .irr-confirm-parcel:last-of-type { border-bottom: none; }
    .irr-confirm-sec-hd {
      font-size: 12px; font-weight: 700; color: #636366;
      padding: 6px 0 2px; border-top: .5px solid rgba(0,0,0,.07); margin-top: 4px;
    }
    .irr-confirm-sec-hd:first-child { border-top: none; margin-top: 0; padding-top: 2px; }
    .irr-confirm-more {
      margin-top: 4px;
    }
    .irr-confirm-more summary {
      font-size: 13px; color: #0172A4; cursor: pointer;
      list-style: none; padding: 2px 0;
    }
    .irr-confirm-more summary::-webkit-details-marker { display: none; }
    .irr-confirm-params {
      width: 100%; max-width: 280px; margin: 4px auto 8px;
      background: #f9f9f9; border-radius: 12px;
      border: 1px solid rgba(0,0,0,.07);
    }
    .irr-confirm-param {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px; padding: 9px 14px;
      border-bottom: .5px solid rgba(0,0,0,.07);
      font-size: 14px;
    }
    .irr-confirm-param:last-child { border-bottom: none; }
    .irr-confirm-param-lbl { color: #8e8e93; flex-shrink: 0; }
    .irr-confirm-param-val { color: #1c1c1e; font-weight: 600; text-align: right; }
    .irr-confirm-badge { font-size: 13px; padding: 3px 12px; border-radius: 20px; margin-top: 4px; }
    .irr-confirm-options { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .irr-confirm-opt {
      border: 1px solid #E0DED8; border-radius: 14px; padding: 14px 16px;
      cursor: pointer; display: flex; align-items: center; gap: 14px;
      background: #fff; transition: border-color .12s;
    }
    .irr-confirm-opt:active { background: #F5F4F0; }
    .irr-confirm-opt--primary { border-color: #185FA5; background: #E6F1FB; }
    .irr-confirm-opt-icon {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 21px;
    }
    .irr-confirm-opt-title { font-size: 15px; font-weight: 500; color: #1A1A18; }
    .irr-confirm-opt-sub   { font-size: 12px; color: #6B6A65; margin-top: 2px; }

    /* ── Calendrier ── */
    .irr-cal-select {
      width: 100%; border: 1px solid #E0DED8; border-radius: 10px;
      padding: 11px 34px 11px 13px; font-size: 14px; font-family: inherit;
      background: #F5F4F0; color: #1A1A18; outline: none;
      text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
    }
    .irr-cal-tabs {
      display: flex; background: #ECEAE4; border-radius: 10px; padding: 3px; gap: 2px;
      margin-bottom: 10px;
    }
    .irr-cal-tab {
      flex: 1; padding: 7px 4px; border-radius: 8px; border: none;
      font-size: 12px; font-family: inherit; cursor: pointer;
      background: transparent; color: #9E9D98; transition: all .15s;
    }
    .irr-cal-tab--active { background: #fff; color: #185FA5; font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .irr-cumuls-bar {
      background: #F5F4F0; border-radius: 10px; padding: 10px 14px;
      display: flex; gap: 10px; margin-bottom: 10px;
    }
    .irr-cumul-block { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .irr-cumul-lbl   { font-size: 10px; color: #9E9D98; text-transform: uppercase; letter-spacing: .05em; }
    .irr-cumul-val   { font-size: 14px; font-weight: 700; color: #1A1A18; }
    .irr-cumul-count { font-size: 11px; color: #9E9D98; }
    .irr-cumul-sep   { width: 1px; background: #E0DED8; }
    .irr-graph-card  { background: #fff; border: 1px solid #E0DED8; border-radius: 12px; padding: 12px; overflow-x: auto; }
    .irr-graph-legend {
      display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;
    }
    .irr-leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #6B6A65; }
    .irr-leg-dot  { width: 8px; height: 8px; border-radius: 3px; flex-shrink: 0; }
    .irr-cal-card { background: #fff; border: 1px solid #E0DED8; border-radius: 12px; padding: 12px; }
    .irr-cal-nav  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .irr-cal-nav-btn {
      width: 32px; height: 32px; border-radius: 16px; border: none;
      background: none; font-size: 19px; color: #185FA5; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .irr-cal-nav-btn:active { background: #E6F1FB; }
    .irr-cal-month { font-size: 15px; font-weight: 600; color: #1A1A18; }
    .irr-cal-grid  { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .irr-cal-dow   { font-size: 10px; font-weight: 700; color: #9E9D98; text-align: center; padding: 2px 0 5px; }
    .irr-cal-day   { display: flex; flex-direction: column; align-items: center; padding: 4px 1px; border-radius: 6px; min-height: 44px; }
    .irr-cal-day--today { background: #E6F1FB; }
    .irr-cal-day--today .irr-cal-num { color: #185FA5; font-weight: 700; }
    .irr-cal-day--sel { background: #185FA5; border-radius: 6px; }
    .irr-cal-day--sel .irr-cal-num { color: #fff; font-weight: 700; }
    .irr-cal-day--evt { cursor: pointer; }
    .irr-cal-day--evt:active { opacity: .7; }

    /* Day detail panel */
    .irr-day-detail {
      background: #fff; border: 1px solid #E0DED8; border-radius: 12px;
      margin-top: 10px; overflow: hidden;
    }
    .irr-day-detail-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-bottom: .5px solid #E0DED8;
    }
    .irr-day-detail-title { font-size: 14px; font-weight: 600; color: #1A1A18; }
    .irr-day-add {
      font-size: 12px; color: #185FA5; background: #E6F1FB; border: none;
      border-radius: 8px; padding: 4px 10px; cursor: pointer; font-family: inherit;
    }
    .irr-day-item {
      display: flex; align-items: center; gap: 8px; padding: 9px 12px;
      border-bottom: .5px solid #F5F4F0;
    }
    .irr-day-item:last-child { border-bottom: none; }
    .irr-day-item-left { display: flex; align-items: center; gap: 7px; flex: 1; min-width: 0; }
    .irr-day-item-badge { font-size: 11px; padding: 2px 7px; border-radius: 8px; white-space: nowrap; }
    .irr-day-item-label { font-size: 13px; color: #1A1A18; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .irr-day-item-mm { font-size: 14px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .irr-cal-num   { font-size: 13px; color: #1A1A18; line-height: 1.4; }
    .irr-cal-dots  { display: flex; gap: 2px; justify-content: center; margin-top: 2px; min-height: 8px; }
    .irr-cal-dot   { width: 6px; height: 6px; border-radius: 50%; }
    .irr-list-section { font-size: 10px; font-weight: 700; color: #9E9D98; text-transform: uppercase; letter-spacing: .06em; margin: 10px 0 6px; }
    .irr-section-details { margin-bottom: 4px; }
    .irr-section-details summary { list-style: none; }
    .irr-section-details summary::-webkit-details-marker { display: none; }
    .irr-section-summary {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700; color: #636366;
      text-transform: uppercase; letter-spacing: .05em;
      padding: 10px 2px 6px; cursor: pointer; user-select: none;
    }
    .irr-section-summary::before {
      content: '▶'; font-size: 9px; color: #aaa; transition: transform .2s;
    }
    details[open] > .irr-section-summary::before { transform: rotate(90deg); }
    .irr-section-count {
      background: #f2f2f7; color: #636366; font-size: 11px;
      padding: 1px 6px; border-radius: 10px; font-weight: 600;
    }
    .irr-list-item {
      background: #fff; border: 1px solid #E0DED8; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 5px; display: flex;
      align-items: center; gap: 10px;
    }
    .irr-list-stripe { width: 3px; align-self: stretch; border-radius: 2px; flex-shrink: 0; }
    .irr-list-date {
      width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .irr-list-label  { font-size: 13px; font-weight: 500; color: #1A1A18; }
    .irr-list-status { font-size: 11px; margin-top: 1px; }
    .irr-list-mm     { font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 8px; white-space: nowrap; margin-left: auto; }

    /* Prévisions */
    .m-prev-select {
      width: 100%; padding: 10px 12px; font-size: 16px; font-family: inherit;
      border: 1px solid rgba(0,0,0,.15); border-radius: 10px; background: #f2f2f7;
      color: #000; margin-bottom: 12px; min-height: 44px;
    }
    .m-prev-cards { display: flex; flex-direction: column; gap: 10px; }
    .m-prev-card {
      border: 1px solid rgba(0,0,0,.08); border-radius: 12px; overflow: hidden; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .m-prev-card:active { opacity: .85; }
    .m-prev-card-hd {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; background: #f9f9f9; border-bottom: .5px solid rgba(0,0,0,.07);
    }
    .m-prev-card-hd-info { flex: 1; min-width: 0; }
    .m-prev-card-day { display: block; font-size: 15px; font-weight: 600; color: #000; }
    .m-prev-card-cond { font-size: 12px; color: #8e8e93; }
    .m-prev-card-body { padding: 2px 0; }
    .m-prev-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; border-bottom: .5px solid rgba(0,0,0,.06); min-height: 34px;
    }
    .m-prev-row--last { border-bottom: none; }
    .m-prev-expand-btn {
      width: 100%; margin-top: 4px;
      padding: 12px; border: 1px dashed rgba(0,0,0,.15);
      border-radius: 12px; background: none;
      font-size: 15px; color: #0172A4; cursor: pointer;
      font-family: inherit; display: flex; align-items: center;
      justify-content: center; gap: 6px;
    }
    .m-day-nav {
      width: 40px; height: 40px; border-radius: 10px;
      border: 1px solid rgba(0,0,0,.12); background: #f2f2f7;
      font-size: 23px; color: #1c1c1e; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit;
    }
    .m-day-nav:disabled { opacity: .3; cursor: default; }
    .m-prev-row span { font-size: 14px; color: #636366; }
    .m-prev-row strong { font-size: 14px; font-weight: 600; color: #000; }
    .m-prev-row em { font-size: 12px; font-weight: 400; color: #8e8e93; font-style: normal; margin-left: 3px; }

    /* Forecast detail sheet */
    .m-prev-detail-top { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .m-prev-detail-cond { font-size: 19px; font-weight: 600; color: #000; }
    .m-prev-detail-date { font-size: 14px; color: #8e8e93; margin-top: 2px; }
    .m-prev-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .m-prev-detail-stat { display: flex; align-items: center; gap: 8px; padding: 12px; background: #fff; border-radius: 10px; }
    .m-prev-detail-stat i { font-size: 19px; color: #0172A4; width: 20px; }
    .m-prev-detail-stat span { font-size: 13px; color: #8e8e93; flex: 1; }
    .m-prev-detail-stat strong { font-size: 15px; font-weight: 700; color: #000; }

    /* Infos Réseau */
    .m-reseau-name {
      font-size: 18px; font-weight: 700; color: #000; margin-bottom: 14px;
    }
    .m-reseau-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 16px;
    }
    .m-reseau-stat {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: #f2f2f7; border-radius: 10px; padding: 12px 6px;
    }
    .m-reseau-stat strong { font-size: 23px; font-weight: 700; color: #0172A4; }
    .m-reseau-stat span   { font-size: 12px; color: #8e8e93; text-align: center; }
    .m-reseau-contacts { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; }
    .m-reseau-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: .5px solid rgba(0,0,0,.06); font-size: 15px; color: #000; min-height: 36px; }
    .m-reseau-row i { color: #0172A4; font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .m-reseau-branches-title { font-size: 13px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .m-reseau-branch { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: .5px solid rgba(0,0,0,.06); font-size: 15px; }
    .m-reseau-branch-name { font-weight: 500; color: #000; }
    .m-reseau-branch-city { color: #8e8e93; }

    /* Support */
    .m-support-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 14px; }
    .m-support-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: .5px solid rgba(0,0,0,.06); text-decoration: none; min-height: 52px; }
    .m-support-row:active { opacity: .7; }
    .m-support-ico { width: 36px; height: 36px; border-radius: 9px; background: #0172A420; color: #0172A4; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .m-support-info { flex: 1; display: flex; flex-direction: column; gap: 1px; }
    .m-support-info span { font-size: 13px; color: #8e8e93; }
    .m-support-info strong { font-size: 15px; font-weight: 500; color: #000; }
    .m-support-center { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px; background: #0172A4; color: #fff; border-radius: 12px; font-size: 16px; font-weight: 500; text-decoration: none; min-height: 48px; }
    .m-support-center:active { opacity: .85; }

    /* Support chat button */
    .m-support-chat-btn {
      width: 100%; display: flex; align-items: center; gap: 12px;
      padding: 12px 0 14px; margin-bottom: 14px;
      border: none; background: none; font-family: inherit; cursor: pointer;
      border-bottom: .5px solid rgba(0,0,0,.1); -webkit-tap-highlight-color: transparent;
    }
    .m-support-chat-btn:active { opacity: .7; }
    .m-support-chat-avatar {
      width: 44px; height: 44px; border-radius: 50%; background: #0172A4;
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 21px; flex-shrink: 0;
    }
    .m-support-chat-info { flex: 1; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
    .m-support-chat-info span { font-size: 16px; font-weight: 600; color: #000; }
    .m-support-chat-info em { font-style: normal; font-size: 13px; color: #30d158; }

    /* Chat sheet */
    .m-sheet-overlay--tall .m-sheet { max-height: 92%; }
    .m-chat-sheet { display: flex; flex-direction: column; height: 100%; }
    .m-chat-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 12px; border-bottom: .5px solid rgba(0,0,0,.1); flex-shrink: 0;
    }
    .m-chat-hd-center { display: flex; align-items: center; gap: 10px; }
    .m-chat-avatar { width: 36px; height: 36px; border-radius: 50%; background: #0172A4; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .m-chat-hd-name { font-size: 15px; font-weight: 600; color: #000; }
    .m-chat-hd-status { font-size: 12px; color: #8e8e93; display: flex; align-items: center; gap: 4px; }
    .m-chat-online { width: 7px; height: 7px; border-radius: 50%; background: #30d158; display: inline-block; }

    .m-chat-messages {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 10px;
      background: #f2f2f7;
    }
    .m-chat-msg { display: flex; }
    .m-chat-msg--user { justify-content: flex-end; }
    .m-chat-msg--bot  { justify-content: flex-start; }
    .m-chat-bubble {
      max-width: 78%; padding: 10px 14px; border-radius: 18px;
      font-size: 16px; line-height: 1.4;
    }
    .m-chat-msg--bot  .m-chat-bubble { background: #fff; color: #000; border-bottom-left-radius: 4px; }
    .m-chat-msg--user .m-chat-bubble { background: #0172A4; color: #fff; border-bottom-right-radius: 4px; }

    /* Typing indicator */
    .m-chat-typing .m-chat-bubble { padding: 12px 16px; }
    .m-chat-typing span {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #8e8e93; margin: 0 2px;
      animation: m-typing 1.2s infinite;
    }
    .m-chat-typing span:nth-child(2) { animation-delay: .2s; }
    .m-chat-typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes m-typing { 0%,60%,100% { opacity:.3; transform: translateY(0); } 30% { opacity:1; transform: translateY(-4px); } }

    .m-chat-input-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px 16px; background: #fff;
      border-top: .5px solid rgba(0,0,0,.1); flex-shrink: 0;
    }
    .m-chat-input {
      flex: 1; padding: 10px 14px; font-size: 16px; font-family: inherit;
      border: 1px solid rgba(0,0,0,.15); border-radius: 22px; background: #f2f2f7;
      color: #000; outline: none; min-height: 42px;
    }
    .m-chat-input:focus { border-color: #0172A4; background: #fff; }
    .m-chat-send {
      width: 36px; height: 36px; border-radius: 50%; background: #0172A4;
      border: none; color: #fff; font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: opacity .15s;
    }
    .m-chat-send:disabled { opacity: .4; cursor: default; }

    /* Widget ••• sheet — liens simples */
    .m-sheet-links {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 4px 0 8px;
    }
    .m-sheet-link {
      display: block;
      padding: 14px 0;
      font-size: 17px;
      color: #0172A4;
      text-align: center;
      cursor: pointer;
      border-bottom: .5px solid rgba(0,0,0,.08);
      -webkit-tap-highlight-color: transparent;
    }
    .m-sheet-link:last-child { border-bottom: none; }
    .m-sheet-link:active { opacity: .5; }
    .m-sheet-link--danger { color: #ff3b30; }

    /* Widget catalog */
    .m-catalog-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: .5px solid rgba(0,0,0,.08); min-height: 56px; }
    .m-catalog-row--soon { opacity: .5; }
    .m-catalog-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .m-catalog-title { flex: 1; font-size: 16px; color: #000; line-height: 1.3; }
    .m-catalog-soon { font-size: 12px; color: #8e8e93; background: #f2f2f7; padding: 3px 8px; border-radius: 20px; }
    .m-catalog-toggle { width: 32px; height: 32px; border: none; background: none; color: #c7c7cc; font-size: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .m-catalog-toggle--on { color: #30d158; }

    /* ── Navigation push/pop ── */
    .m-detail-layer {
      position: absolute;
      top: 50px; left: 0; right: 0; bottom: 82px;
      background: #f2f2f7;
      z-index: 1000;
      transform: translateX(100%);

      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: block;
    }

    /* Header détail : 2 lignes */
    .m-detail-header {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(249,249,249,.95);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: .5px solid rgba(0,0,0,.12);
    }
    /* Detail header — topbar : back left, + right */

      display: flex; align-items: center; justify-content: space-between;
      height: 44px; padding: 0 12px;

      display: flex; align-items: center; gap: 10px;

      font-size: 17px; font-weight: 700; color: #000;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

      font-size: 13px; color: #8e8e93; margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;

      display: flex; align-items: center; gap: 2px;

      display: grid; grid-template-columns: 1fr auto 1fr;

    .m-detail-row2 {
      display: flex; align-items: center;
      padding: 4px 12px 10px; gap: 4px; overflow: hidden;
    }
    .m-d-name {
      font-size: 16px; font-weight: 600; color: #000;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-d-sep { font-size: 14px; color: #c7c7cc; flex-shrink: 0; }
    .m-d-sub {
      font-size: 14px; color: #3c3c43;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-d-commune {
      font-size: 14px; color: #8e8e93;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex-shrink: 4; min-width: 10px;
    }
    .m-detail-star {
      width: 36px; height: 36px; border: none; background: none;
      font-size: 21px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; color: #8e8e93;
      flex-shrink: 0;
    }
    .m-detail-plus {
      width: 30px; height: 30px;
      background: #0172A4; color: #fff; border: none;
      border-radius: 50%; font-size: 21px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;

    .m-detail-journal-btn {
      width: 30px; height: 30px;
      background: none; color: #0172A4; border: none;
      font-size: 19px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;

    /* Mobile journal timeline */
    .m-jrn-timeline { padding: 8px 16px 24px; }

    .m-jrn-aside { display: flex; flex-direction: column; align-items: center; width: 34px; flex-shrink: 0; }
    .m-jrn-dot {
      width: 32px; height: 32px; border-radius: 50%;

      font-size: 14px; flex-shrink: 0; border: 1.5px solid transparent;

    .m-jrn-texte { font-size: 14px; color: #1c1c1e; line-height: 1.5; margin-bottom: 6px; }
    .m-jrn-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .m-jrn-chip {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; color: #3a3a3c; background: rgba(0,0,0,.05);
      border-radius: 6px; padding: 3px 8px;
    }

    .m-detail-tabs {
      display: flex;
      background: #fff;
      border-bottom: .5px solid rgba(0,0,0,.1);
      flex-shrink: 0;

    .m-detail-tab {
      flex: 1; padding: 12px 4px; text-align: center;

    /* Charts */
    .m-chart-card {
      background: #fff; margin: 0 16px 12px;
      border-radius: 12px; overflow: hidden;
      border: 1px solid rgba(0,0,0,.07);

    .m-export-btn {
      flex-shrink: 0; background: none;
      border: 1px solid rgba(0,0,0,.15); border-radius: 7px;
      padding: 5px 9px; font-size: 15px; color: #0172A4;
      cursor: pointer; line-height: 1;
    }
    .m-export-btn:active { background: rgba(0,122,255,.08); }

    /* Period bar */
    .m-period-bar {
      display: flex; align-items: center; gap: 8px;

    .m-step-sel {

      font-size: 15px;
      font-family: inherit;

    .m-placeholder-widget {
      background: #fff; margin: 0 16px 10px;

      min-height: 100px;

      display: flex; align-items: center; justify-content: space-between;

      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    /* ── Widget catalog (parcelle detail) ── */
    .m-wcat-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; border-bottom: .5px solid rgba(0,0,0,.06);
      font-size: 15px; color: #1c1c1e;
    }
    .m-wcat-add {
      background: none; border: none; color: #0172A4; font-size: 19px;
      cursor: pointer; padding: 0 0 0 12px; flex-shrink: 0;
    }

    /* ── Widget list layout (traitements, événements, cultures) ── */
    .m-w-list { display: flex; flex-direction: column; }
    .m-w-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: .5px solid rgba(0,0,0,.07);
    }
    .m-w-row:last-child { border-bottom: none; }
    .m-w-row-main { flex: 1; min-width: 0; }
    .m-w-row-name { font-size: 14px; font-weight: 600; color: #1c1c1e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .m-w-row-sub  { font-size: 12px; color: #8e8e93; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .m-ev-badge   { font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 3px; background: rgba(0,0,0,.05); border-radius: 6px; padding: 2px 7px; }
    .m-w-row--clickable { cursor: pointer; }
    .m-w-row--clickable:active { background: rgba(0,0,0,.04); margin: 0 -12px; padding: 10px 12px; border-radius: 8px; }
    .m-w-section-hd { font-size: 11px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: .05em; padding: 10px 0 4px; }
    .m-w-section-hd:first-child { padding-top: 2px; }
    .m-widget-hint { font-size: 11px; color: #8e8e93; margin-bottom: 10px; line-height: 1.4; }
    .m-crop-group { border-radius: 10px; overflow: hidden; border: 1px solid rgba(0,0,0,.09); margin-bottom: 7px; }
    .m-crop-summary {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; background: #EDF4F4; cursor: pointer;
      border-left: 3px solid #a2c4c9; user-select: none; list-style: none;
    }
    .m-crop-summary::-webkit-details-marker { display: none; }
    .m-crop-summary-left { display: flex; flex-direction: column; gap: 1px; }
    .m-crop-summary-name { font-size: 13px; font-weight: 700; color: #1c1c1e; }
    .m-crop-summary-count { font-size: 11px; color: #6B9FA0; }
    .m-crop-chevron { font-size: 13px; color: #a2c4c9; transition: transform .2s; flex-shrink: 0; }
    details[open] > .m-crop-summary > .m-crop-chevron { transform: rotate(90deg); }
    .m-crop-plots { padding: 0 2px; }
    .m-crop-plots .m-w-row { padding: 10px 10px; }
    .m-crop-plots .m-w-row:last-child { border-bottom: none; }
    .m-w-see-more {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px; margin-top: 4px; font-size: 13px; font-weight: 500;
      color: #185FA5; cursor: pointer; border-radius: 8px;
    }
    .m-w-see-more:active { background: #E6F1FB; }

    /* ── Widgets form partagé (Mesures + Cumuls) ── */
    .m-wf-form { display: flex; flex-direction: column; gap: 8px; padding: 4px 0 8px; }
    .m-wf-disabled { opacity: .5; pointer-events: none; }
    .m-wf-sel {
      width: 100%; padding: 8px 10px; font-size: 14px; font-family: inherit;
      border: 1px solid rgba(0,0,0,.15); border-radius: 10px;
      background: #f2f2f7; color: #000;
    }
    .m-wf-sel:disabled { opacity: .5; }
    .m-wf-row { display: flex; gap: 8px; }
    .m-wf-row .m-wf-sel { flex: 1; }
    .m-wf-field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .m-wf-label { font-size: 12px; color: #8e8e93; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
    .m-wf-date {
      padding: 7px 10px; font-size: 14px; font-family: inherit;
      border: 1px solid rgba(0,0,0,.15); border-radius: 10px; background: #f2f2f7;
    }
    .m-wf-err  { font-size: 13px; color: #ff3b30; }
    .m-wf-create-btn {
      width: 100%; padding: 11px; border-radius: 10px;
      background: #0172A4; color: #fff; border: none;
      font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .m-wf-create-btn:disabled { opacity: .4; cursor: default; }
    .m-wf-max-msg { font-size: 13px; color: #8e8e93; text-align: center; padding: 4px 0; }
    .m-wf-empty   { text-align: center; padding: 12px; font-size: 14px; color: #8e8e93; }
    .m-wf-card { background: #fff; border: 1px solid #E0DED8; border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; }
    .m-wf-card-hd { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .m-wf-card-title { font-size: 14px; font-weight: 600; }
    .m-wf-card-sub   { font-size: 12px; color: #8e8e93; margin-top: 2px; }
    .m-wf-del {
      background: none; border: none; color: #c7c7cc; font-size: 19px;
      cursor: pointer; padding: 0 2px; flex-shrink: 0; line-height: 1;
    }
    .m-wf-del:hover { color: #ff3b30; }

    .m-cumuls-create-btn {
      width: 100%; padding: 11px; border-radius: 10px;
      background: #bf5af2; color: #fff; border: none;
      font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .m-cumuls-create-btn:disabled { opacity: .4; cursor: default; }
    .m-cumuls-result {
      background: linear-gradient(135deg, #bf5af220, #9b59f220);
      border-radius: 10px; padding: 14px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .m-cumuls-val { font-size: 34px; font-weight: 700; color: #bf5af2; line-height: 1; }
    .m-cumuls-unit { font-size: 13px; color: #8e8e93; }
    .m-cumuls-saved { display: flex; flex-direction: column; gap: 10px; padding: 4px 0 8px; }
    .m-cumuls-saved-card {
      background: #fff; border-radius: 12px; border: 1px solid rgba(0,0,0,.08);
      padding: 12px 36px 12px 16px; display: flex; flex-direction: column; gap: 3px;
    }
    .m-cumuls-saved-row1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .m-cumuls-saved-metric { font-size: 14px; font-weight: 600; color: #1c1c1e; }
    .m-cumuls-saved-val { font-size: 19px; font-weight: 700; color: #1c1c1e; }
    .m-cumuls-saved-unit { font-size: 13px; font-weight: 400; color: #8e8e93; }
    .m-cumuls-saved-row2 { font-size: 13px; color: #3a3a3c; }
    .m-cumuls-saved-row3 { font-size: 12px; color: #8e8e93; }
    .m-cumuls-del {
      position: absolute; top: 8px; right: 8px;
      background: none; border: none; color: #c7c7cc;
      font-size: 19px; line-height: 1; cursor: pointer; padding: 0 2px;
    }
    .m-cumuls-del:hover { color: #ff3b30; }

    /* m-list-row-col (used in exploitation/reseau screens) */
    .m-list-row-col { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
    .m-list-row-sub { font-size: 12px; color: #8e8e93; }

    /* Mini map in params — isolation pour que les z-index Leaflet ne débordent pas */
    .m-minimap-container {
      height: 150px; width: 100%;
      border-bottom: .5px solid rgba(0,0,0,.08);
      isolation: isolate;
      position: relative;
      z-index: 0;
    }

    /* Tappable list rows */
    .m-tappable { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .m-tappable:active { background: #f2f2f7; }

    /* ── Écrans parcelles / capteurs ── */
    .m-screen-controls {
      position: sticky;
      top: 44px; /* sous la navbar */
      z-index: 9;
      background: #f2f2f7;
      padding: 10px 16px 8px;
      border-bottom: .5px solid rgba(0,0,0,.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .m-view-toggle {
      display: flex;
      background: #e5e5ea;
      border-radius: 9px;
      padding: 2px;
      gap: 2px;
    }
    .m-view-btn {
      flex: 1;
      padding: 9px 8px;
      border: none;
      background: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 500;
      color: #3c3c43;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 38px;
      transition: background .15s;
    }
    .m-view-btn--on {
      background: #fff;
      color: #000;
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }

    .m-filter-row {
      display: flex;
      gap: 8px;
    }
    .m-filter-select {
      flex: 1;
      min-width: 0;
      padding: 9px 10px;
      font-size: 15px;
      font-family: inherit;
      border: 1px solid rgba(0,0,0,.15);
      border-radius: 9px;
      background: #fff;
      color: #000;
      min-height: 42px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hidden { display: none !important; }

    /* Carte Leaflet */
    /* Parcelles & capteurs : layout flex pour que la carte remplisse jusqu'en bas */
    #screen-parcelles.active,
    #screen-capteurs.active {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #screen-parcelles .m-navbar,
    #screen-capteurs .m-navbar {
      flex-shrink: 0;
    }
    #parcelles-content,
    #capteurs-content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #screen-parcelles .m-screen-controls,
    #screen-capteurs .m-screen-controls {
      flex-shrink: 0;
      position: relative;
      top: auto;
    }
    .m-map-view {
      flex: 1;
      min-height: 0;
    }
    .m-map-container {
      height: 100%;
      width: 100%;
    }
    .m-list-view {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    /* Tooltip parcelle/capteur — spécificité suffisante pour écraser Leaflet */
    .leaflet-tooltip.m-map-tip,
    .m-map-tip {
      background: #1a1a1a !important;
      border: none !important;
      border-radius: 6px !important;
      padding: 4px 10px !important;
      color: #fff !important;
      font-size: 14px !important;
      font-weight: 700 !important;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,.5) !important;
      cursor: pointer !important;
      opacity: 1 !important;
    }
    .leaflet-tooltip.m-map-tip::before,
    .m-map-tip::before { display: none !important; }

    /* Liste simple parcelles / capteurs */
    .m-plain-list { background: #fff; }
    .m-plain-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: .5px solid rgba(0,0,0,.08);
      gap: 12px;
      min-height: 52px;
    }
    .m-plain-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .m-plain-name {
      font-size: 16px;
      color: #000;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .m-plain-city { font-size: 13px; color: #8e8e93; }
    .m-plain-data {
      font-size: 17px;
      font-weight: 700;
      color: #0172A4;
      flex-shrink: 0;
    }
    .m-plain-na { color: #c7c7cc; font-weight: 400; font-size: 15px; }

    .m-itinerary-link {
      display: flex; align-items: center; gap: 6px;
      font-size: 15px; color: #0172A4; text-decoration: none;
      padding: 2px 0;
    }

    /* Capteurs liste (icône + nom + valeur) */
    .m-sensor-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: .5px solid rgba(0,0,0,.08);
      background: #fff;
      min-height: 56px;
    }
    .m-sensor-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .m-sensor-info { flex: 1; min-width: 0; }
    .m-sensor-name {
      font-size: 15px; font-weight: 500; color: #000;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-sensor-sub { font-size: 12px; color: #8e8e93; }
    .m-sensor-val { font-size: 17px; font-weight: 700; color: #0172A4; flex-shrink: 0; }
    .m-sensor-val--na { color: #c7c7cc; font-weight: 400; }

    .m-empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; padding: 48px 16px;
      color: #8e8e93; font-size: 15px;
    }
    .m-empty-state i { font-size: 38px; opacity: .3; }

    /* Réorganisation dashboard */
    .m-reorder-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0; border-bottom: .5px solid rgba(0,0,0,.08); min-height: 52px;
    }
    .m-reorder-title { flex: 1; font-size: 16px; color: #000; }
    .m-reorder-btns  { display: flex; gap: 6px; flex-shrink: 0; }
    .m-reorder-btn {
      width: 36px; height: 36px; border: 1px solid rgba(0,0,0,.15);
      border-radius: 8px; background: #f2f2f7; color: #000;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .m-reorder-btn[disabled] { opacity: .3; cursor: default; }

    /* ── Alertes ── */
    .m-alert-card {
      background: #fff;
      margin: 0 16px 12px;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.07);
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .m-alert-card:first-child { margin-top: 12px; }
    .m-alert-card:active { opacity: .85; }

    .m-alert-card-hd {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px 10px;
      border-bottom: .5px solid rgba(0,0,0,.07);
    }
    .m-alert-icon-wrap {
      width: 32px; height: 32px; border-radius: 8px;
      background: #ff3b3020; color: #ff3b30;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .m-alert-icon-wrap--off {
      background: #e5e5ea; color: #8e8e93;
    }
    .m-alert-name {
      flex: 1; font-size: 15px; font-weight: 600; color: #000;
      min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-alert-toggle { flex-shrink: 0; }

    .m-alert-body { padding: 2px 0 4px; }
    .m-alert-row {
      display: flex; align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 14px;
      border-bottom: .5px solid rgba(0,0,0,.05);
    }
    .m-alert-row--last { border-bottom: none; }
    .m-alert-row-label {
      font-size: 13px; color: #8e8e93;
      flex-shrink: 0; white-space: nowrap;
    }
    .m-alert-row-val {
      font-size: 14px; color: #000; font-weight: 500;
      text-align: right; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Mon compte ── */
    .m-compte-avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 12px;
      gap: 6px;
      background: #f2f2f7;
    }
    .m-compte-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #0172A4;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 30px;
      font-weight: 700;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .m-compte-name { font-size: 21px; font-weight: 600; color: #000; }
    .m-compte-avatar-btn { font-size: 15px; color: #0172A4; cursor: pointer; }

    /* ── iOS grouped list ── */
    .m-list-section-header {
      padding: 6px 32px 4px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #8e8e93;
    }
    .m-list-section-header--danger { color: #ff3b30; }
    .m-list {
      background: #fff;
      margin: 0 16px 20px;
      border-radius: 12px;
      overflow: hidden;
    }
    .m-list-row {
      display: flex;
      align-items: center;
      padding: 11px 16px;
      gap: 10px;
      border-bottom: .5px solid rgba(0,0,0,.1);
      cursor: pointer;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .m-list-row:active { background: #f2f2f7; }
    .m-list-row--last { border-bottom: none; }
    .m-list-row-col { display: flex; flex-direction: column; gap: 1px; flex: 1; }
    .m-list-row-label { flex: 1; font-size: 16px; color: #000; }
    .m-list-row-sub { font-size: 12px; color: #8e8e93; }
    .m-list-row-value {
      font-size: 16px;
      color: #8e8e93;
      max-width: 170px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .m-list-chevron { color: #c7c7cc; font-size: 13px; flex-shrink: 0; }

    /* ── iOS Toggle ── */
    .m-toggle { position: relative; display: inline-block; width: 51px; height: 31px; flex-shrink: 0; }
    .m-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .m-toggle-track {
      position: absolute; inset: 0;
      background: #e5e5ea;
      border-radius: 31px;
      cursor: pointer;
      transition: background .2s;
    }
    .m-toggle-track::after {
      content: '';
      position: absolute;
      left: 2px; top: 2px;
      width: 27px; height: 27px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,.25);
      transition: transform .2s;
    }
    .m-toggle input:checked + .m-toggle-track { background: #34c759; }
    .m-toggle input:checked + .m-toggle-track::after { transform: translateX(20px); }

    /* ── List footer ── */
    .m-list-section-footer {
      padding: 4px 32px 16px;
      font-size: 13px;
      color: #8e8e93;
      line-height: 1.4;
    }

    /* ── Bottom sheet ── */
    .m-sheet-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      transition: background .25s;
      border-radius: 48px;
      overflow: hidden;
    }
    .m-sheet-overlay--show { background: rgba(0,0,0,.45); }

    .m-sheet {
      width: 100%;
      background: #f2f2f7;
      border-radius: 14px 14px 0 0;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.32,1,.23,1);
      max-height: 80%;
      display: flex;
      flex-direction: column;
    }
    .m-sheet-overlay--show .m-sheet { transform: translateY(0); }

    .m-sheet-handle {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: rgba(0,0,0,.2);
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    .m-sheet-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      flex-shrink: 0;
    }
    .m-sheet-title { font-size: 16px; font-weight: 600; color: #000; }
    .m-sheet-cancel, .m-sheet-done {
      border: none; background: none;
      font-family: inherit; font-size: 16px;
      cursor: pointer; padding: 0;
    }
    .m-sheet-cancel { color: #8e8e93; }
    .m-sheet-done   { color: #0172A4; font-weight: 600; }

    .m-sheet-body {
      overflow-y: auto;
      padding: 0 16px 32px;
      flex: 1;
    }

    .m-sheet-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      font-family: inherit;
      border: 1px solid rgba(0,0,0,.15);
      border-radius: 10px;
      background: #fff;
      color: #000;
      margin-bottom: 10px;
      box-sizing: border-box;
      outline: none;
    }
    .m-sheet-input--sm { padding: 9px 12px; font-size: 15px; }
    .m-sheet-input:focus { border-color: #0172A4; }

    .m-sheet-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      background: #fff;
      border-bottom: .5px solid rgba(0,0,0,.1);
      cursor: pointer; font-size: 16px; color: #000;
    }
    .m-sheet-option:last-child { border-bottom: none; }
    .m-sheet-option:active { background: #f2f2f7; }
    .m-sheet-option--active { font-weight: 500; }

    .m-sheet-phone-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .m-sheet-phone-fields { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .m-sheet-remove {
      width: 32px; height: 32px; border-radius: 50%;
      background: #ff3b30; color: #fff; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .m-sheet-add-phone {
      width: 100%; padding: 12px; border: 1px dashed rgba(0,0,0,.2);
