<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Weenat — Mobile</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111318;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      gap: 20px;
    }

    /* ── Context label ── */
    .context-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      color: rgba(255,255,255,.45);
      font-size: 12px;
      letter-spacing: .04em;
    }
    .context-bar a {
      color: rgba(255,255,255,.3);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color .15s;
    }
    .context-bar a:hover { color: rgba(255,255,255,.7); }
    .context-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #30d158;
      box-shadow: 0 0 6px #30d158;
    }

    /* ── Phone shell ── */
    .phone-shell {
      width: 390px;
      height: 844px;
      border-radius: 54px;
      background: #1c1c1e;
      box-shadow:
        0 0 0 1px #3a3a3c,
        0 0 0 3px #1c1c1e,
        0 0 0 4px #48484a,
        0 30px 80px rgba(0,0,0,.8);
      position: relative;
      flex-shrink: 0;
    }

    /* Side buttons */
    .phone-shell::before {
      content: '';
      position: absolute;
      left: -3px; top: 140px;
      width: 3px; height: 36px;
      background: #3a3a3c;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 52px 0 #3a3a3c, 0 104px 0 #3a3a3c;
    }
    .phone-shell::after {
      content: '';
      position: absolute;
      right: -3px; top: 200px;
      width: 3px; height: 70px;
      background: #3a3a3c;
      border-radius: 0 2px 2px 0;
    }

    /* ── Phone screen ── */
    .phone-screen {
      position: absolute;
      inset: 6px;
      border-radius: 48px;
      overflow: hidden;
      background: #f2f2f7;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* ── Status bar ── */
    .status-bar {
      height: 50px;
      padding: 14px 28px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .status-bar.light { color: #000; }
    .status-bar.dark  { color: #fff; }
    .status-time { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
    .status-icons { display: flex; align-items: center; gap: 6px; font-size: 13px; }

    /* Dynamic island */
    .dynamic-island {
      position: absolute;
      top: 10px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 20;
    }

    /* ── Screens ── */
    .screen-stack {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .m-screen {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      display: none;
    }
    .m-screen.active { display: block; }

    /* Navbar sticks to top within scrolling screen */
    .m-screen .m-navbar {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    /* Segment sticks just below the navbar */
    #screen-parametres .m-segment-wrap {
      position: sticky;
      top: 44px;
      z-index: 9;
    }

    /* Placeholder screen */
    .screen-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #8e8e93;
      min-height: 300px;
    }
    .screen-placeholder i { font-size: 40px; opacity: .35; }
    .screen-placeholder p { font-size: 14px; }

    /* ── Bottom nav ── */
    .bottom-nav {
      height: 82px;
      background: rgba(249,249,249,.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: .5px solid rgba(0,0,0,.12);
      display: flex;
      align-items: flex-start;
      padding-top: 6px;
      flex-shrink: 0;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 4px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border: none;
      background: none;
      color: #8e8e93;
      font-family: inherit;
      transition: color .1s;
    }
    .nav-item.active { color: #007aff; }
    .nav-item i { font-size: 22px; line-height: 1; }
    .nav-item span { font-size: 10px; font-weight: 500; letter-spacing: -.1px; }

    /* ── Top nav bar ── */
    .m-navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      padding: 0 16px;
      background: rgba(249,249,249,.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: .5px solid rgba(0,0,0,.12);
      flex-shrink: 0;
    }

    .m-navbar-logo {
      display: flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
    }
    .m-navbar-logo-mark {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: #0172A4;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -.5px;
    }

    .m-navbar-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 17px;
      font-weight: 600;
      color: #000;
      letter-spacing: -.3px;
      pointer-events: none;
    }

    .m-navbar-action {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #0172A4;
      border: none;
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity .15s;
    }
    .m-navbar-action:active { opacity: .7; }

    /* ── Segmented control (Paramètres tabs) ── */
    .m-segment-wrap {
      padding: 10px 16px 8px;
      background: #f2f2f7;
      flex-shrink: 0;
    }
    .m-segment {
      display: flex;
      background: #e5e5ea;
      border-radius: 9px;
      padding: 2px;
      gap: 2px;
    }
    .m-segment-btn {
      flex: 1;
      border: none;
      background: none;
      border-radius: 7px;
      padding: 6px 4px;
      font-size: 12px;
      font-weight: 500;
      color: #3c3c43;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .m-segment-btn.active {
      background: #fff;
      color: #000;
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }

    .m-subscreen {
      display: none;
    }
    .m-subscreen.active { display: block; }

    /* ── Dashboard ── */
    .m-exploit-banner {
      display: flex; align-items: center; gap: 8px;
      margin: 12px 16px 8px;
      padding: 10px 14px;
      background: #fff;
      border-radius: 10px;
      font-size: 15px; font-weight: 600; color: #000;
      border: 1px solid rgba(0,0,0,.07);
    }
    .m-exploit-banner i { color: #0172A4; font-size: 16px; }

    .m-widget {
      margin: 0 16px 16px;
      background: #fff;
      border-radius: 14px;
      border: 1px solid rgba(0,0,0,.07);
      overflow: hidden;
    }
    .m-widget-hd {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 14px 10px;
      border-bottom: .5px solid rgba(0,0,0,.08);
    }
    .m-widget-icon-wrap {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .m-widget-title { flex: 1; font-size: 15px; font-weight: 600; color: #000; }
    .m-widget-menu {
      width: 36px; height: 36px; border: none; background: none;
      font-size: 16px; color: #8e8e93; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; letter-spacing: 1px;
    }
    .m-widget-menu:active { background: #f2f2f7; }
    .m-widget-bd { padding: 12px 14px 14px; }
    .m-widget-empty { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px; color: #8e8e93; font-size: 14px; }
    .m-widget-more { text-align: center; font-size: 13px; color: #007aff; padding-top: 8px; }

    /* Bilan hydrique */
    .m-bh-table {
      display: grid;
      grid-template-columns: 1fr 42px 42px 52px;
      gap: 0 6px;
    }
    .m-bh-th {
      font-size: 11px; font-weight: 700; color: #8e8e93;
      text-align: right; padding-bottom: 8px; text-transform: uppercase; letter-spacing: .03em;
    }
    .m-bh-th:first-child { text-align: left; }
    .m-bh-th-n {
      font-size: 14px; color: #000; padding: 9px 0;
      border-top: .5px solid rgba(0,0,0,.07);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .m-bh-td {
      font-size: 13px; color: #636366; text-align: right;
      padding: 9px 0; border-top: .5px solid rgba(0,0,0,.07);
      white-space: nowrap;
    }
    .m-bh-expand {
      width: 100%; padding: 12px; margin-top: 8px;
      border: 1px dashed rgba(0,0,0,.15); border-radius: 10px;
      background: none; font-size: 14px; color: #007aff;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    /* Prévisions */
    .m-prev-select {
      width: 100%; padding: 10px 12px; font-size: 15px; font-family: inherit;
      border: 1px solid rgba(0,0,0,.15); border-radius: 10px; background: #f2f2f7;
      color: #000; margin-bottom: 12px; min-height: 44px;
    }
    .m-prev-cards { display: flex; flex-direction: column; gap: 10px; }
    .m-prev-card {
      border: 1px solid rgba(0,0,0,.08); border-radius: 12px; overflow: hidden; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .m-prev-card:active { opacity: .85; }
    .m-prev-card-hd {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: #f9f9f9; border-bottom: .5px solid rgba(0,0,0,.07);
    }
    .m-prev-card-hd-info { flex: 1; min-width: 0; }
    .m-prev-card-day { display: block; font-size: 15px; font-weight: 600; color: #000; }
    .m-prev-card-cond { font-size: 12px; color: #8e8e93; }
    .m-prev-card-body { padding: 4px 0; }
    .m-prev-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: .5px solid rgba(0,0,0,.06); min-height: 44px;
    }
    .m-prev-row--last { border-bottom: none; }
    .m-prev-row span { font-size: 14px; color: #636366; }
    .m-prev-row strong { font-size: 14px; font-weight: 600; color: #000; }
    .m-prev-row em { font-size: 12px; font-weight: 400; color: #8e8e93; font-style: normal; margin-left: 4px; }

    /* Forecast detail sheet */
    .m-prev-detail-top { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .m-prev-detail-cond { font-size: 18px; font-weight: 600; color: #000; }
    .m-prev-detail-date { font-size: 13px; color: #8e8e93; margin-top: 2px; }
    .m-prev-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .m-prev-detail-stat { display: flex; align-items: center; gap: 8px; padding: 12px; background: #fff; border-radius: 10px; }
    .m-prev-detail-stat i { font-size: 18px; color: #0172A4; width: 20px; }
    .m-prev-detail-stat span { font-size: 12px; color: #8e8e93; flex: 1; }
    .m-prev-detail-stat strong { font-size: 14px; font-weight: 700; color: #000; }

    /* Infos Réseau */
    .m-reseau-name {
      font-size: 17px; font-weight: 700; color: #000; margin-bottom: 14px;
    }
    .m-reseau-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-bottom: 16px;
    }
    .m-reseau-stat {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: #f2f2f7; border-radius: 10px; padding: 12px 6px;
    }
    .m-reseau-stat strong { font-size: 22px; font-weight: 700; color: #0172A4; }
    .m-reseau-stat span   { font-size: 11px; color: #8e8e93; text-align: center; }
    .m-reseau-contacts { display: flex; flex-direction: column; gap: 2px; margin-bottom: 12px; }
    .m-reseau-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: .5px solid rgba(0,0,0,.06); font-size: 14px; color: #000; min-height: 36px; }
    .m-reseau-row i { color: #0172A4; font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .m-reseau-branches-title { font-size: 12px; font-weight: 700; color: #8e8e93; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .m-reseau-branch { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: .5px solid rgba(0,0,0,.06); font-size: 14px; }
    .m-reseau-branch-name { font-weight: 500; color: #000; }
    .m-reseau-branch-city { color: #8e8e93; }

    /* Support */
    .m-support-list { display: flex; flex-direction: column; gap: 2px; margin-bottom: 14px; }
    .m-support-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: .5px solid rgba(0,0,0,.06); text-decoration: none; min-height: 52px; }
    .m-support-row:active { opacity: .7; }
    .m-support-ico { width: 36px; height: 36px; border-radius: 9px; background: #0172A420; color: #0172A4; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .m-support-info { flex: 1; display: flex; flex-direction: column; gap: 1px; }
    .m-support-info span { font-size: 12px; color: #8e8e93; }
    .m-support-info strong { font-size: 14px; font-weight: 500; color: #000; }
    .m-support-center { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 13px; background: #0172A4; color: #fff; border-radius: 12px; font-size: 15px; font-weight: 500; text-decoration: none; min-height: 48px; }
    .m-support-center:active { opacity: .85; }

    /* Support chat button */
    .m-support-chat-btn {
      width: 100%; display: flex; align-items: center; gap: 12px;
      padding: 12px 0 14px; margin-bottom: 14px;
      border: none; background: none; font-family: inherit; cursor: pointer;
      border-bottom: .5px solid rgba(0,0,0,.1); -webkit-tap-highlight-color: transparent;
    }
    .m-support-chat-btn:active { opacity: .7; }
    .m-support-chat-avatar {
      width: 44px; height: 44px; border-radius: 50%; background: #0172A4;
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .m-support-chat-info { flex: 1; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
    .m-support-chat-info span { font-size: 15px; font-weight: 600; color: #000; }
    .m-support-chat-info em { font-style: normal; font-size: 12px; color: #30d158; }

    /* Chat sheet */
    .m-sheet-overlay--tall .m-sheet { max-height: 92%; }
    .m-chat-sheet { display: flex; flex-direction: column; height: 100%; }
    .m-chat-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 12px; border-bottom: .5px solid rgba(0,0,0,.1); flex-shrink: 0;
    }
    .m-chat-hd-center { display: flex; align-items: center; gap: 10px; }
    .m-chat-avatar { width: 36px; height: 36px; border-radius: 50%; background: #0172A4; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 17px; }
    .m-chat-hd-name { font-size: 14px; font-weight: 600; color: #000; }
    .m-chat-hd-status { font-size: 11px; color: #8e8e93; display: flex; align-items: center; gap: 4px; }
    .m-chat-online { width: 7px; height: 7px; border-radius: 50%; background: #30d158; display: inline-block; }

    .m-chat-messages {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 10px;
      background: #f2f2f7;
    }
    .m-chat-msg { display: flex; }
    .m-chat-msg--user { justify-content: flex-end; }
    .m-chat-msg--bot  { justify-content: flex-start; }
    .m-chat-bubble {
      max-width: 78%; padding: 10px 14px; border-radius: 18px;
      font-size: 15px; line-height: 1.4;
    }
    .m-chat-msg--bot  .m-chat-bubble { background: #fff; color: #000; border-bottom-left-radius: 4px; }
    .m-chat-msg--user .m-chat-bubble { background: #007aff; color: #fff; border-bottom-right-radius: 4px; }

    /* Typing indicator */
    .m-chat-typing .m-chat-bubble { padding: 12px 16px; }
    .m-chat-typing span {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #8e8e93; margin: 0 2px;
      animation: m-typing 1.2s infinite;
    }
    .m-chat-typing span:nth-child(2) { animation-delay: .2s; }
    .m-chat-typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes m-typing { 0%,60%,100% { opacity:.3; transform: translateY(0); } 30% { opacity:1; transform: translateY(-4px); } }

    .m-chat-input-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px 16px; background: #fff;
      border-top: .5px solid rgba(0,0,0,.1); flex-shrink: 0;
    }
    .m-chat-input {
      flex: 1; padding: 10px 14px; font-size: 15px; font-family: inherit;
      border: 1px solid rgba(0,0,0,.15); border-radius: 22px; background: #f2f2f7;
      color: #000; outline: none; min-height: 42px;
    }
    .m-chat-input:focus { border-color: #007aff; background: #fff; }
    .m-chat-send {
      width: 36px; height: 36px; border-radius: 50%; background: #007aff;
      border: none; color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: opacity .15s;
    }
    .m-chat-send:disabled { opacity: .4; cursor: default; }

    /* Widget catalog */
    .m-catalog-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: .5px solid rgba(0,0,0,.08); min-height: 56px; }
    .m-catalog-row--soon { opacity: .5; }
    .m-catalog-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .m-catalog-title { flex: 1; font-size: 15px; color: #000; line-height: 1.3; }
    .m-catalog-soon { font-size: 11px; color: #8e8e93; background: #f2f2f7; padding: 3px 8px; border-radius: 20px; }
    .m-catalog-toggle { width: 32px; height: 32px; border: none; background: none; color: #c7c7cc; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .m-catalog-toggle--on { color: #30d158; }

    /* ── Navigation push/pop ── */
    .m-detail-layer {
      position: absolute;
      top: 50px; left: 0; right: 0; bottom: 0;
      background: #f2f2f7;
      z-index: 50;
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.32,1,.23,1);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: block;
    }
    .m-detail-layer--in { transform: translateX(0); }

    /* Header détail : 2 lignes */
    .m-detail-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(249,249,249,.95);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: .5px solid rgba(0,0,0,.12);
    }
    /* Ligne 1 : logo W | lien retour centré | bouton + */
    .m-detail-row1 {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      height: 44px; padding: 0 12px;
    }
    .m-detail-row1 .m-navbar-logo-mark { justify-self: start; }
    .m-detail-row1 .m-detail-back      { justify-self: center; }
    .m-detail-row1 .m-detail-plus      { justify-self: end; }
    /* Ligne 2 : ← retour · icône + nom · ⭐ */
    .m-detail-row2 {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px 10px;
      min-height: 44px;
    }
    .m-detail-back {
      display: flex; align-items: center; gap: 1px;
      border: none; background: none; color: #007aff;
      font-size: 14px; cursor: pointer; font-family: inherit;
      padding: 0; white-space: nowrap; flex-shrink: 0; min-height: 36px;
    }
    .m-detail-back i { font-size: 20px; }
    /* Ligne 2 : étoile · nom · culture/modèle · commune */
    .m-detail-row2 {
      display: flex; align-items: center;
      padding: 4px 12px 10px; gap: 4px; overflow: hidden;
    }
