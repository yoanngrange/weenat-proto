<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/weenat-proto/assets/favicon-Ba1UlvcJ.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graphique – Weenat Proto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <script type="module" crossorigin src="/weenat-proto/assets/capteur-graphique-lhenVU3q.js"></script>
    <link rel="modulepreload" crossorigin href="/weenat-proto/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/weenat-proto/assets/sensors-CRadjF8G.js">
    <link rel="modulepreload" crossorigin href="/weenat-proto/assets/plots-DhtWL7s_.js">
    <link rel="stylesheet" crossorigin href="/weenat-proto/assets/main-nrhdLg3G.css">
  </head>
  <body class="fs-page">

    <div class="fs-topbar" id="fs-topbar">
      <a class="fs-back-btn" id="back-btn" href="#">
        <i class="bi bi-arrow-left"></i>
        <span id="back-label">Retour</span>
      </a>
      <div class="fs-metric-center">
        <select class="fs-metric-sel" id="metric-sel"></select>
        <span class="fs-metric-unit" id="metric-unit"></span>
      </div>
      <button class="fs-cfg-btn" id="cfg-btn" title="Configuration">
        <i class="bi bi-sliders"></i>
        <span>Config.</span>
      </button>
    </div>

    <div class="chart-controls fs-period-bar" id="fs-period-bar">
      <div class="chart-controls-row">
        <div class="period-presets" id="period-presets">
          <button class="period-preset-btn" data-period="custom">Personnalisé…</button>
          <button class="period-preset-btn" data-period="365d">365 jours</button>
          <button class="period-preset-btn" data-period="30d">30 jours</button>
          <button class="period-preset-btn active" data-period="7d">7 jours</button>
          <button class="period-preset-btn" data-period="3d">3 jours</button>
          <button class="period-preset-btn" data-period="hier">Hier</button>
          <button class="period-preset-btn" data-period="1d">Aujourd'hui</button>
        </div>
        <div id="custom-date-row" class="custom-date-row" style="display:none">
          <input type="date" id="date-from">
          <span class="custom-date-sep">—</span>
          <input type="date" id="date-to">
        </div>
        <select id="time-step" class="time-step-select">
          <option value="max">Maximal</option>
          <option value="1h" selected>Horaire</option>
          <option value="1d">Journalier</option>
          <option value="1w">Hebdomadaire</option>
          <option value="1mo">Mensuel</option>
        </select>
      </div>
    </div>

    <div class="fs-chart-wrap" id="chart-wrap">
      <svg id="main-chart" class="fs-chart-svg" width="100%" height="100%"></svg>
      <div class="fs-chart-tooltip" id="chart-tooltip"></div>
    </div>

    <div class="fs-cfg-backdrop" id="cfg-backdrop"></div>
    <aside class="fs-config-panel" id="config-panel">
      <div class="fs-config-hd">
        <span class="fs-config-title">Configuration</span>
        <button class="fs-config-close" id="cfg-close"><i class="bi bi-x-lg"></i></button>
      </div>
      <div class="fs-config-body" id="config-body"></div>
    </aside>

  </body>
</html>
